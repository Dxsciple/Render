<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Oe Velako GYM</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="admin-header">
        <div class="container">
            <h1>Gestión de Usuarios</h1>
            <a href="index.html" class="btn btn-logout">Cerrar Sesión</a>
        </div>
    </header>

    <main class="container">
        <div class="dashboard-panel">
            <div class="card-info">
                <h3>USUARIOS ACTIVOS</h3>
                <p id="total-users">0</p>
            </div>
            <div class="card-info">
                <h3>FECHA DE HOY</h3>
                <p id="fecha-hoy">--/--/--</p>
            </div>
            <button id="btn-nuevo" class="btn btn-primary big-btn">+ Añadir Nuevo Usuario</button>
        </div>

        <table class="user-table">
            <thead>
                <tr>
                    <th>Foto</th>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Genotipo</th>
                    <th>Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </main>

    <div id="user-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">Añadir Usuario</h2>
            <form id="user-form">
                <input type="hidden" id="user-id">
                <div class="form-grid">
                    <div class="form-group"><label>Nombre:</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Email:</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Teléfono:</label><input type="tel" id="phone"></div>
                    <div class="form-group"><label>Fecha Registro:</label><input type="date" id="fecha" required></div>
                    <div class="form-group"><label>Edad:</label><input type="number" id="edad"></div>
                    <div class="form-group">
                        <label>Genotipo:</label>
                        <select id="genotipo">
                            <option value="">Selecciona</option>
                            <option value="Ectomorfo">Ectomorfo</option>
                            <option value="Mesomorfo">Mesomorfo</option>
                            <option value="Endomorfo">Endomorfo</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Foto (URL):</label><input type="text" id="foto"></div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:20px;">GUARDAR FICHA</button>
            </form>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
